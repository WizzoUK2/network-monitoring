apiVersion: 1

datasources:
  # Loki - syslog and log data
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: true
    editable: true
    jsonData:
      maxLines: 1000

  # ClickHouse - flow analytics and structured data
  - name: ClickHouse
    type: grafana-clickhouse-datasource
    access: proxy
    editable: true
    jsonData:
      host: clickhouse
      port: 9000
      protocol: native
      defaultDatabase: netmon
      username: netmon
    secureJsonData:
      password: ${CLICKHOUSE_PASSWORD:-changeme}

  # InfluxDB - high-resolution real-time metrics (Phase 3)
  - name: InfluxDB
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    editable: true
    jsonData:
      version: Flux
      organization: ${INFLUXDB_ORG:-netmon}
      defaultBucket: ${INFLUXDB_BUCKET:-network}
    secureJsonData:
      token: ${INFLUXDB_TOKEN:-netmon-influx-token}

  # Analyzer API - enriched data via JSON API (Phase 2+)
  - name: Analyzer
    type: yesoreyeram-infinity-datasource
    access: proxy
    editable: true
    jsonData:
      url: http://analyzer:8080
