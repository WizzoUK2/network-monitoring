# Alertmanager configuration for network monitoring
# Edit this file to configure alert routing (webhook, email, Slack, etc.)

global:
  resolve_timeout: 5m

route:
  # Default receiver for all alerts
  receiver: "default"
  # Group alerts by name and source to reduce noise
  group_by: ["alertname", "source_ip"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  routes:
    # Critical alerts get their own route for faster notification
    - match:
        severity: critical
      receiver: "critical"
      group_wait: 10s
      repeat_interval: 1h

    # Info-level alerts are quieter
    - match:
        severity: info
      receiver: "default"
      repeat_interval: 12h

receivers:
  # Default: log only (replace with webhook/email for production)
  - name: "default"
    # Uncomment and configure for Slack:
    # slack_configs:
    #   - api_url: "https://hooks.slack.com/services/YOUR/WEBHOOK/URL"
    #     channel: "#network-alerts"
    #     title: "{{ .GroupLabels.alertname }}"
    #     text: "{{ range .Alerts }}{{ .Annotations.summary }}\n{{ end }}"

    # Uncomment and configure for generic webhook:
    # webhook_configs:
    #   - url: "http://your-webhook-endpoint:8080/alerts"
    #     send_resolved: true

  # Critical alerts (customize for your needs)
  - name: "critical"
    # webhook_configs:
    #   - url: "http://your-pager-endpoint:8080/page"
    #     send_resolved: true

# Inhibition rules: suppress lower-severity alerts when higher ones fire
inhibit_rules:
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["alertname", "source_ip"]
